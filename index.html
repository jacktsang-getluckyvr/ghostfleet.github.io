<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Fleet Gamble</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1rem;
      background: #0a1628;
      color: #e8eef4;
      font-family: system-ui, "Segoe UI", sans-serif;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin: 0 0 0.75rem;
    }
    .toolbar {
      margin-bottom: 0.75rem;
    }
    button#reset {
      padding: 0.4rem 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: inherit;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button#reset:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    /*
     * 9×6 click grid over GhostFleet_Gameplay.png (1536×1024).
     * Box is fit to detected neon grid lines (~84×78 px per cell); tweak if your asset differs.
     */
    :root {
      --img-w: 1536;
      --img-h: 1024;
      --grid-px-left: 317;
      --grid-px-top: 188;
      --grid-px-width: 756;
      --grid-px-height: 468;
    }

    .stage {
      position: relative;
      display: block;
      width: min(96vw, 960px);
      line-height: 0;
    }
    .stage img {
      display: block;
      width: 100%;
      height: auto;
      pointer-events: none;
      user-select: none;
    }

    #board {
      position: absolute;
      left: calc(var(--grid-px-left) * 100% / var(--img-w));
      top: calc(var(--grid-px-top) * 100% / var(--img-h));
      width: calc(var(--grid-px-width) * 100% / var(--img-w));
      height: calc(var(--grid-px-height) * 100% / var(--img-h));
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 0;
    }

    .cell {
      min-width: 0;
      min-height: 0;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      background: transparent;
      border-radius: 1px;
      transition: box-shadow 0.1s ease, background 0.1s ease;
    }
    .cell:hover:not(:disabled) {
      box-shadow: inset 0 0 0 2px rgba(125, 211, 252, 0.45);
    }
    .cell:disabled {
      cursor: default;
    }
    .cell.revealed {
      /* Opaque black tile — hides that square of the artwork (fog-of-war) */
      background: #000000;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      opacity: 0.65;
      text-align: center;
      max-width: 28rem;
    }
  </style>
</head>
<body>
  <h1>Ghost Fleet Gamble</h1>
  <div class="toolbar">
    <button type="button" id="reset">Clear grid</button>
  </div>

  <div class="stage">
    <img
      src="GhostFleet_Gameplay.png"
      width="1536"
      height="1024"
      alt="Ghost Fleet Gamble"
    >
    <div id="board" role="grid" aria-label="Sea grid" aria-rowcount="6" aria-colcount="9"></div>
  </div>

  <p class="hint">Click a square to uncover it (black). Use Clear grid to play again.</p>

  <script>
    const COLS = 9;
    const ROWS = 6;

    const boardEl = document.getElementById('board');
    const resetBtn = document.getElementById('reset');

    function buildGrid() {
      boardEl.innerHTML = '';
      const total = COLS * ROWS;
      for (let i = 0; i < total; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cell';
        btn.setAttribute('aria-label', 'Hidden square');
        btn.addEventListener('click', () => {
          if (btn.disabled) return;
          btn.classList.add('revealed');
          btn.disabled = true;
          btn.setAttribute('aria-label', 'Uncovered');
        });
        boardEl.appendChild(btn);
      }
    }

    resetBtn.addEventListener('click', buildGrid);
    buildGrid();
  </script>
</body>
</html>
