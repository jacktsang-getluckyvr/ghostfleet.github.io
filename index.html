<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Fleet Gamble</title>
  <style>
    :root {
      --sea: #1e3a5f;
      --sea-light: #2d5a87;
      --water-hit: #4a90c2;
      --boat: #c45c26;
      --cell-size: min(7vw, 40px);
      font-family: system-ui, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background-color: #0a1628;
      background-image: url("GhostFleet_Gameplay.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: contain;
      color: #e8eef4;
    }

    .game-ui {
      margin: 1rem;
      padding: 1rem 1.25rem 1.25rem;
      max-width: calc(100vw - 2rem);
      background: rgba(10, 22, 40, 0.82);
      border: 1px solid rgba(125, 211, 252, 0.22);
      border-radius: 14px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      backdrop-filter: blur(8px);
    }

    h1 {
      font-size: 1.15rem;
      font-weight: 600;
      margin: 0 0 0.5rem;
      text-align: center;
      letter-spacing: 0.04em;
      color: #bae6fd;
      text-shadow: 0 0 12px rgba(56, 189, 248, 0.35);
    }

    .stats {
      margin-bottom: 0.85rem;
      font-size: 0.92rem;
      opacity: 0.95;
      text-align: center;
    }

    .stats span { font-weight: 700; color: #7dd3fc; }

    #board {
      display: grid;
      gap: 4px;
      padding: 10px;
      background: rgba(0, 0, 0, 0.2);
      border-radius: 10px;
    }

    .cell {
      width: var(--cell-size);
      height: var(--cell-size);
      border: none;
      border-radius: 5px;
      cursor: pointer;
      background: var(--sea-light);
      box-shadow: inset 0 -2px 0 rgba(0, 0, 0, 0.25);
      transition: transform 0.08s ease, filter 0.15s ease;
    }

    .cell:hover:not(:disabled) {
      filter: brightness(1.12);
      transform: scale(1.02);
    }

    .cell:disabled {
      cursor: default;
    }

    .cell.reveal-water {
      background: var(--water-hit);
      box-shadow: none;
    }

    .cell.reveal-boat {
      background: var(--boat);
      box-shadow: none;
      font-size: calc(var(--cell-size) * 0.45);
      line-height: 1;
    }

    .footer {
      margin-top: 0.85rem;
      font-size: 0.8rem;
      opacity: 0.7;
      text-align: center;
    }

    button#reset {
      display: block;
      margin: 0.75rem auto 0;
      padding: 0.45rem 1rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: inherit;
      cursor: pointer;
      font-size: 0.88rem;
    }

    button#reset:hover {
      background: rgba(255, 255, 255, 0.15);
    }
  </style>
</head>
<body>
  <div class="game-ui">
    <h1>Ghost Fleet Gamble</h1>
    <p class="stats">Boats found: <span id="found">0</span> / <span id="total">0</span></p>
    <div id="board" role="grid" aria-label="Game board"></div>
    <button type="button" id="reset">New game</button>
    <p class="footer">Click a square to reveal water or a boat.</p>
  </div>

  <script>
    const COLS = 10;
    const ROWS = 6;
    const BOAT_COUNT = 12;

    const boardEl = document.getElementById('board');
    const foundEl = document.getElementById('found');
    const totalEl = document.getElementById('total');
    const resetBtn = document.getElementById('reset');

    let boatsFound = 0;
    let boatTotal = BOAT_COUNT;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function buildGame() {
      boardEl.innerHTML = '';
      boardEl.style.gridTemplateColumns = `repeat(${COLS}, var(--cell-size))`;

      const cells = COLS * ROWS;
      const isBoat = new Array(cells).fill(false);
      const indices = shuffle([...Array(cells).keys()]);
      for (let i = 0; i < BOAT_COUNT; i++) isBoat[indices[i]] = true;

      boatsFound = 0;
      boatTotal = BOAT_COUNT;
      foundEl.textContent = '0';
      totalEl.textContent = String(boatTotal);

      for (let i = 0; i < cells; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cell';
        btn.dataset.index = String(i);
        btn.setAttribute('aria-label', 'Hidden square');
        btn.addEventListener('click', () => reveal(btn, isBoat[i]));
        boardEl.appendChild(btn);
      }
    }

    function reveal(btn, hasBoat) {
      if (btn.disabled) return;
      btn.disabled = true;

      if (hasBoat) {
        btn.classList.add('reveal-boat');
        btn.textContent = '\u{1F6A2}';
        btn.setAttribute('aria-label', 'Boat');
        boatsFound++;
        foundEl.textContent = String(boatsFound);
      } else {
        btn.classList.add('reveal-water');
        btn.setAttribute('aria-label', 'Water');
      }
    }

    resetBtn.addEventListener('click', buildGame);
    buildGame();
  </script>
</body>
</html>
