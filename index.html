<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Fleet Gamble</title>
  <style>
    :root {
      font-family: system-ui, "Segoe UI", sans-serif;
      /* Align overlay to the painted grid in GhostFleet_Gameplay.png (1536×1024). Tweak if needed. */
      --grid-left: 33.6%;
      --grid-top: 37.8%;
      --grid-width: 31.6%;
      --grid-height: 24.8%;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #0a1628;
      color: #e8eef4;
    }

    .hud {
      text-align: center;
      margin-bottom: 0.75rem;
      padding: 0 1rem;
    }

    .hud h1 {
      font-size: 1rem;
      font-weight: 600;
      margin: 0 0 0.35rem;
      letter-spacing: 0.06em;
      color: #bae6fd;
    }

    .stats {
      font-size: 0.9rem;
      margin: 0;
    }

    .stats span { font-weight: 700; color: #7dd3fc; }

    .hud-actions {
      margin-top: 0.5rem;
    }

    button#reset {
      padding: 0.4rem 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: inherit;
      cursor: pointer;
      font-size: 0.85rem;
    }

    button#reset:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    /* Image + invisible hit grid aligned to art */
    .stage {
      position: relative;
      display: block;
      width: min(96vw, 1200px);
      line-height: 0;
    }

    .stage img {
      display: block;
      width: 100%;
      height: auto;
      vertical-align: top;
      pointer-events: none;
      user-select: none;
    }

    #board {
      position: absolute;
      left: var(--grid-left);
      top: var(--grid-top);
      width: var(--grid-width);
      height: var(--grid-height);
      z-index: 1;
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 0;
    }

    .cell {
      min-width: 0;
      min-height: 0;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      background: transparent;
      border-radius: 2px;
      transition: box-shadow 0.12s ease, background 0.12s ease;
    }

    .cell:hover:not(:disabled) {
      box-shadow: inset 0 0 0 2px rgba(125, 211, 252, 0.55);
    }

    .cell:disabled {
      cursor: default;
    }

    .cell.reveal-water {
      background: rgba(74, 144, 194, 0.72);
      box-shadow: inset 0 0 0 1px rgba(15, 30, 50, 0.35);
    }

    .cell.reveal-boat {
      background: rgba(196, 92, 38, 0.78);
      box-shadow: inset 0 0 0 1px rgba(15, 30, 50, 0.35);
      font-size: clamp(12px, 5vmin, 22px);
      line-height: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hint {
      margin-top: 0.65rem;
      font-size: 0.78rem;
      opacity: 0.65;
      padding: 0 1rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="hud">
    <h1>Ghost Fleet Gamble</h1>
    <p class="stats">Boats found: <span id="found">0</span> / <span id="total">0</span></p>
    <div class="hud-actions">
      <button type="button" id="reset">New game</button>
    </div>
  </header>

  <div class="stage">
    <img
      src="GhostFleet_Gameplay.png"
      width="1536"
      height="1024"
      alt="Ghost Fleet Gamble — click the sea grid to play"
    >
    <div id="board" role="grid" aria-label="Sea grid"></div>
  </div>

  <p class="hint">Click the squares on the board in the artwork. If the overlay looks misaligned, adjust the CSS variables <code>--grid-left</code>, <code>--grid-top</code>, <code>--grid-width</code>, and <code>--grid-height</code> in <code>index.html</code>.</p>

  <script>
    const COLS = 9;
    const ROWS = 6;
    const BOAT_COUNT = 12;

    const boardEl = document.getElementById('board');
    const foundEl = document.getElementById('found');
    const totalEl = document.getElementById('total');
    const resetBtn = document.getElementById('reset');

    let boatsFound = 0;
    let boatTotal = BOAT_COUNT;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }

    function buildGame() {
      boardEl.innerHTML = '';

      const cells = COLS * ROWS;
      const isBoat = new Array(cells).fill(false);
      const indices = shuffle([...Array(cells).keys()]);
      for (let i = 0; i < BOAT_COUNT; i++) isBoat[indices[i]] = true;

      boatsFound = 0;
      boatTotal = BOAT_COUNT;
      foundEl.textContent = '0';
      totalEl.textContent = String(boatTotal);

      for (let i = 0; i < cells; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cell';
        btn.dataset.index = String(i);
        btn.setAttribute('aria-label', 'Hidden square');
        btn.addEventListener('click', () => reveal(btn, isBoat[i]));
        boardEl.appendChild(btn);
      }
    }

    function reveal(btn, hasBoat) {
      if (btn.disabled) return;
      btn.disabled = true;

      if (hasBoat) {
        btn.classList.add('reveal-boat');
        btn.textContent = '\u{1F6A2}';
        btn.setAttribute('aria-label', 'Boat');
        boatsFound++;
        foundEl.textContent = String(boatsFound);
      } else {
        btn.classList.add('reveal-water');
        btn.setAttribute('aria-label', 'Water');
      }
    }

    resetBtn.addEventListener('click', buildGame);
    buildGame();
  </script>
</body>
</html>
