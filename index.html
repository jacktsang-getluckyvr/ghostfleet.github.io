<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ghost Fleet Gamble v4</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      padding: 1rem;
      background: #0a1628;
      color: #e8eef4;
      font-family: system-ui, "Segoe UI", sans-serif;
    }
    h1 {
      font-size: 1.1rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin: 0 0 0.75rem;
    }
    .toolbar {
      margin-bottom: 0.75rem;
    }
    button#reset {
      padding: 0.4rem 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.25);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.1);
      color: inherit;
      cursor: pointer;
      font-size: 0.85rem;
    }
    button#reset:hover {
      background: rgba(255, 255, 255, 0.18);
    }

    /*
     * GhostFleet_Gameplay.png 1536×1024. Main grid 9×6; 10th column is separate.
     * Pixel refs use literal /1536 and /1024 so % layout matches the bitmap.
     */
    :root {
      --img-w: 1536;
      --img-h: 1024;
      --grid-px-left: 317;
      --grid-px-top: 188;
      --grid-px-width: 756;
      --grid-px-height: 468;
      --extra-col-left: 1073;
      --extra-col-top: 266;
    }

    .stage {
      position: relative;
      display: block;
      width: min(96vw, 960px);
      aspect-ratio: 1536 / 1024;
      flex-shrink: 0;
      line-height: 0;
      isolation: isolate;
    }
    .stage img {
      position: absolute;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      object-fit: fill;
      pointer-events: none;
      user-select: none;
      z-index: 0;
    }

    /* Wrapper ignores events; only .cell buttons receive clicks */
    .board-layer {
      position: absolute;
      display: grid;
      gap: 0;
      pointer-events: none;
    }
    .board-layer .cell {
      pointer-events: auto;
    }

    /*
     * Pin top + bottom (not height) so the hit area always matches the art:
     * bottom inset = 1024 - 188 - 468 = 368
     */
    #board {
      z-index: 2;
      left: calc(100% * 317 / 1536);
      top: calc(100% * 188 / 1024);
      width: calc(100% * 756 / 1536);
      height: calc(100% * 468 / 1024);
      grid-template-columns: repeat(9, 1fr);
      grid-template-rows: repeat(6, minmax(0, 1fr));
    }

    /* Tenth column — below main board so it cannot steal hits from the 9×6 grid */
    #board-extra-col {
      z-index: 1;
      left: calc(100% * 1073 / 1536);
      top: calc(100% * 266 / 1024);
      width: calc(100% * 84 / 1536);
      height: calc(100% * 390 / 1024);
      grid-template-columns: 1fr;
      grid-template-rows: repeat(5, minmax(0, 1fr));
    }

    .cell {
      position: relative;
      z-index: 0;
      min-width: 0;
      min-height: 0;
      border: none;
      padding: 0;
      margin: 0;
      cursor: pointer;
      background: transparent;
      border-radius: 1px;
      transition: box-shadow 0.1s ease, background 0.1s ease;
    }
    .cell:hover:not(:disabled) {
      box-shadow: inset 0 0 0 2px rgba(125, 211, 252, 0.45);
    }
    .cell:disabled {
      cursor: default;
    }
    .cell.revealed {
      background: #000000;
      box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.06);
    }

    .hint {
      margin-top: 0.75rem;
      font-size: 0.8rem;
      opacity: 0.65;
      text-align: center;
      max-width: 28rem;
    }
  </style>
</head>
<body>
  <h1>Ghost Fleet Gamble</h1>
  <div class="toolbar">
    <button type="button" id="reset">Clear grid</button>
  </div>

  <div class="stage">
    <img
      src="GhostFleet_Gameplay.png"
      width="1536"
      height="1024"
      alt="Ghost Fleet Gamble"
    >
    <div id="board" class="board-layer" role="grid" aria-label="Sea grid" aria-rowcount="6" aria-colcount="9"></div>
    <div id="board-extra-col" class="board-layer" role="grid" aria-label="Extra column"></div>
  </div>

  <p class="hint">Click any sea square to uncover it (black), including the extra column on the right. Clear grid resets all.</p>

  <script>
    const COLS = 9;
    const ROWS = 6;

    const boardEl = document.getElementById('board');
    const extraColEl = document.getElementById('board-extra-col');
    const resetBtn = document.getElementById('reset');

    function wireCell(btn) {
      btn.addEventListener('click', () => {
        if (btn.disabled) return;
        btn.classList.add('revealed');
        btn.disabled = true;
        btn.setAttribute('aria-label', 'Uncovered');
      });
    }

    function buildGrid() {
      boardEl.innerHTML = '';
      for (let i = 0; i < COLS * ROWS; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cell';
        btn.setAttribute('aria-label', 'Hidden square');
        wireCell(btn);
        boardEl.appendChild(btn);
      }

      extraColEl.innerHTML = '';
      for (let i = 0; i < 5; i++) {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'cell';
        btn.setAttribute('aria-label', 'Hidden square');
        wireCell(btn);
        extraColEl.appendChild(btn);
      }
    }

    resetBtn.addEventListener('click', buildGrid);
    buildGrid();
  </script>
</body>
</html>
